<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welfare Branch Diary</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Chart.js for graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- EmailJS SDK v4 -->
    <script type="importmap">
        {
            "imports": {
                "emailjs": "https://cdn.jsdelivr.net/npm/emailjs-com@4.2.0/+esm"
            }
        }
    </script>
    <script type="module">
        import emailjs from 'emailjs';
        window.emailjs = emailjs;
    </script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --sidebar-bg: #1E1E1E;
            --content-bg: #121212;
            --card-bg: #1B1B1B;
            --primary-color: #3B82F6;
            --text-primary: #EDEDED;
            --text-secondary: #A1A1AA;
            --border-color: #333333;
            --hover-bg: #2A2A2A;
            --gradient-bg: linear-gradient(145deg, #1B1B1B, #252525);
        }
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--content-bg);
            color: var(--text-primary);
        }
        .sidebar {
            background-color: var(--sidebar-bg);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 60px;
            transition: width 0.3s ease, transform 0.3s ease;
            z-index: 100;
            box-shadow: 4px 0 12px rgba(0, 0, 0, 0.6);
        }
        @media (min-width: 768px) {
            .sidebar { width: 300px; }
        }
        .dashboard-card {
            background: var(--gradient-bg);
            transition: all 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.8);
            background: var(--hover-bg);
        }
        .status-Pending { background-color: #292415; color: #facc15; }
        .status-Sent { background-color: #1a2c4e; color: #60a5fa; }
        .status-Approved { background-color: #1a4235; color: #34d399; }
        .status-Objection { background-color: #551e1e; color: #f87171; }
        .status-Rejected { background-color: #442a5a; color: #c4b5fd; }
        .error-message {
            color: #f87171;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="min-h-screen flex items-center justify-center">
        <div class="bg-[var(--card-bg)] p-8 rounded-xl max-w-md w-full">
            <h2 class="text-2xl font-bold text-center mb-6">Login to Welfare Diary</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label for="username" class="text-sm font-semibold text-[var(--text-secondary)]">Username</label>
                    <input type="text" id="username" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="Enter username" required>
                </div>
                <div>
                    <label for="password" class="text-sm font-semibold text-[var(--text-secondary)]">Password</label>
                    <input type="password" id="password" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="Enter password" required>
                </div>
                <button type="submit" class="w-full bg-[var(--primary-color)] text-white p-3 rounded-lg">Login</button>
            </form>
            <p id="loginError" class="error-message hidden mt-2">Invalid username or password</p>
            <p class="text-center mt-4">
                <a href="#" id="forgotPasswordLink" class="text-[var(--primary-color)] hover:underline">Forgot Password?</a>
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContent" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Modal -->
        <div id="customModal" class="fixed inset-0 bg-black bg-opacity-70 hidden flex items-center justify-center z-[1000]">
            <div id="modalContent" class="bg-[var(--card-bg)] p-6 rounded-xl max-w-sm w-full">
                <h3 id="modalTitle" class="text-xl font-bold mb-3"></h3>
                <p id="modalMessage" class="mb-5"></p>
                <div id="modalActions" class="flex justify-end gap-3"></div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar flex flex-col">
            <div class="flex items-center gap-3 p-4 border-b border-[var(--border-color)]">
                <img src="/logo.jpeg" alt="Welfare Branch Logo" class="w-10 h-10 rounded-md" onerror="this.src='https://via.placeholder.com/40?text=WL'" />
                <div class="hidden md:block">
                    <span class="font-semibold text-lg">Welfare Branch Diary</span>
                    <span class="text-[var(--text-secondary)] text-sm">Special Protection Unit</span>
                </div>
            </div>
            <div id="menu" class="flex-1 overflow-y-auto mt-2 px-2"></div>
            <div class="p-4 border-t border-[var(--border-color)]">
                <button id="logoutBtn" class="flex items-center gap-3 w-full text-left text-[#ccc] p-3 rounded-lg hover:bg-[#2c2c2c]">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                    <span class="hidden md:inline">Logout</span>
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 p-4 md:ml-[60px] lg:ml-[300px]" id="mainContent">
            <button id="menuToggle" class="md:hidden fixed top-4 left-4 p-2 rounded-full bg-[var(--primary-color)] text-white">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <div id="topBar" class="flex flex-col sm:flex-row gap-3 mb-4">
                <input id="search" class="w-full p-3 rounded-lg bg-[var(--card-bg)] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="Search..." />
                <button id="exportTabXlsx" class="flex items-center gap-1 px-4 py-2 rounded-lg bg-gray-700 text-[var(--text-primary)]">
                    <i data-lucide="file-spreadsheet" class="w-4 h-4"></i> Export (XLS)
                </button>
            </div>
            <div id="contentArea" class="flex flex-col gap-4"></div>
        </div>
    </div>

    <script>
        // Firebase Config (Replace with your actual Firebase config)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        let db;
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                firebase.firestore().enablePersistence().catch(err => console.error('Firestore offline error:', err));
            }
            db = firebase.firestore();
        } catch (e) {
            console.error('Firebase init error:', e);
            showModal('Error', 'Database connection failed.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
        }

        // Sections Configuration
        const SECTIONS = [
            { id: 'dashboard', title: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'medical', title: 'Medical Financial Assistance', key: 'welfare_medical', icon: 'badge-dollar', fields: [
                { k: 'dateReceived', label: 'Date Received', type: 'date' },
                { k: 'applicantName', label: 'Applicant Name', type: 'text' },
                { k: 'beltNo', label: 'Belt No', type: 'text' },
                { k: 'status', label: 'Status', type: 'select', options: ['Pending', 'Sent', 'Approved', 'Rejected', 'Objection'] }
            ]},
            { id: 'wmc', title: 'Welfare Management Committee', icon: 'users', subSections: [
                { id: 'wmc_medical', title: 'Medical Financial Assistance', key: 'welfare_wmc_medical', icon: 'badge-dollar', fields: [
                    { k: 'dateReceived', label: 'Date Received', type: 'date' },
                    { k: 'applicantName', label: 'Applicant Name', type: 'text' },
                    { k: 'claimAmount', label: 'Claim Amount', type: 'number' },
                    { k: 'status', label: 'Status', type: 'select', options: ['Pending', 'Sent', 'Approved', 'Rejected', 'Objection'] }
                ]}
            ]}
        ];

        let state = {}, activeId = 'dashboard', subActiveId = null, filterStatus = null, selectedIndex = null;
        let isMenuOpen = false;

        // DOM Elements
        const loginPage = document.getElementById('loginPage');
        const appContent = document.getElementById('appContent');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const sidebarEl = document.querySelector('.sidebar');
        const mainContentEl = document.getElementById('mainContent');
        const menuToggleEl = document.getElementById('menuToggle');
        const menuEl = document.getElementById('menu');
        const contentArea = document.getElementById('contentArea');

        // Initialize Lucide Icons
        function initializeIcons() {
            if (typeof lucide !== 'undefined') {
                try { lucide.createIcons(); } catch (e) { console.error('Lucide init error:', e); }
            } else {
                console.warn('Lucide not loaded.');
            }
        }

        // Modal Logic
        function showModal(title, message, options = {}) {
            const modalEl = document.getElementById('customModal');
            const modalTitleEl = document.getElementById('modalTitle');
            const modalMessageEl = document.getElementById('modalMessage');
            const modalActionsEl = document.getElementById('modalActions');
            modalTitleEl.textContent = title;
            modalMessageEl.textContent = message;
            modalActionsEl.innerHTML = '';
            modalEl.classList.remove('hidden');
            modalEl.classList.add('flex');
            const actions = options.actions || [{ text: 'OK', value: true, style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' }];
            if (options.customInput) modalMessageEl.insertAdjacentHTML('afterend', options.customInput);
            actions.forEach(action => {
                const btn = document.createElement('button');
                btn.textContent = action.text;
                btn.className = action.style;
                btn.addEventListener('click', () => {
                    modalEl.classList.add('hidden');
                    if (options.resolve) options.resolve(action.value);
                }, { once: true });
                modalActionsEl.appendChild(btn);
            });
            return new Promise(resolve => options.resolve = resolve);
        }

        // State Management
        async function loadState() {
            try {
                if (!db) throw new Error('Firestore not initialized');
                const snap = await db.collection('app_states').doc('default').get();
                state = snap.exists() ? snap.data() : {};
                SECTIONS.forEach(sec => {
                    if (sec.key && !state[sec.key]) state[sec.key] = [];
                    if (sec.subSections) sec.subSections.forEach(sub => { if (sub.key && !state[sub.key]) state[sub.key] = []; });
                });
            } catch (e) {
                console.error('Load state error:', e);
                showModal('Error', 'Failed to load data.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
            }
        }

        async function saveState() {
            try {
                if (!db) throw new Error('Firestore not initialized');
                await db.collection('app_states').doc('default').set(state);
            } catch (e) {
                console.error('Save state error:', e);
                showModal('Error', 'Failed to save data.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
            }
        }

        // Login Logic
        async function initAuth() {
            const defaultCredentials = { username: 'admin', password: 'welfare123' };
            let stored = defaultCredentials;
            try {
                if (db) {
                    const authSnap = await db.collection('auth').doc('default').get();
                    if (!authSnap.exists()) await db.collection('auth').doc('default').set(defaultCredentials);
                    else stored = authSnap.data();
                }
            } catch (e) {
                console.error('Auth error:', e);
                loginError.textContent = 'Database error. Using default credentials.';
                loginError.classList.remove('hidden');
            }

            if (sessionStorage.getItem('welfare_logged_in') === 'true') {
                loginPage.classList.add('hidden');
                appContent.classList.remove('hidden');
                await loadState();
                buildMenu();
                renderContent();
            }

            // Initialize EmailJS v4
            if (typeof emailjs !== 'undefined') {
                try {
                    emailjs.init({
                        publicKey: "z23sZPbxKFo03LWJd", // Replace with your actual EmailJS public key
                        origin: window.location.origin
                    });
                } catch (e) {
                    console.error('EmailJS init error:', e);
                    showModal('Error', 'Failed to initialize email service.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
                }
            } else {
                console.warn('EmailJS not loaded.');
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                try {
                    if (username === stored.username && password === stored.password) {
                        sessionStorage.setItem('welfare_logged_in', 'true');
                        loginPage.classList.add('hidden');
                        appContent.classList.remove('hidden');
                        await loadState();
                        buildMenu();
                        renderContent();
                    } else {
                        loginError.textContent = 'Invalid username or password';
                        loginError.classList.remove('hidden');
                    }
                } catch (e) {
                    console.error('Login error:', e);
                    loginError.textContent = 'Login error. Try again.';
                    loginError.classList.remove('hidden');
                }
            });

            document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {
                e.preventDefault();
                if (typeof emailjs === 'undefined') {
                    showModal('Error', 'Email service not available.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
                    return;
                }
                const email = 'jcwelfare56@gmail.com';
                const resetCode = Math.floor(100000 + Math.random() * 900000).toString();
                try {
                    await db.collection('reset_codes').doc(resetCode).set({
                        email, code: resetCode, timestamp: new Date().toISOString(), used: false,
                        expiresAt: new Date(Date.now() + 30 * 60 * 1000).toISOString()
                    });
                    await emailjs.send('spuwelfare', 'template_bce4eet', {
                        to_email: email,
                        reset_code: resetCode,
                        to_name: 'User'
                    });
                    showModal('Success', `Reset code sent to ${email}.`, {
                        actions: [
                            { text: 'OK', value: true, style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' },
                            { text: 'Enter Code', value: 'enter', style: 'bg-green-600 text-white px-4 py-2 rounded-lg' }
                        ]
                    }).then(async (result) => {
                        if (result === 'enter') {
                            const code = await showModal('Enter Reset Code', 'Enter the 6-digit reset code:', {
                                actions: [
                                    { text: 'Cancel', value: false, style: 'bg-gray-600 text-[var(--text-primary)] px-4 py-2 rounded-lg' },
                                    { text: 'Submit', value: true, style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' }
                                ],
                                customInput: `<input type="text" id="resetCodeInput" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="Enter 6-digit code" required>`
                            });
                            if (code === true) {
                                const enteredCode = document.getElementById('resetCodeInput').value;
                                const codeSnap = await db.collection('reset_codes').doc(enteredCode).get();
                                if (codeSnap.exists() && codeSnap.data().email === email && !codeSnap.data().used && new Date(codeSnap.data().expiresAt) > new Date()) {
                                    const newPassword = await showModal('Reset Password', 'Enter new password (min 6 chars):', {
                                        actions: [
                                            { text: 'Cancel', value: false, style: 'bg-gray-600 text-[var(--text-primary)] px-4 py-2 rounded-lg' },
                                            { text: 'Save', value: true, style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' }
                                        ],
                                        customInput: `<input type="password" id="newPasswordInput" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="New password" required>`
                                    });
                                    if (newPassword === true) {
                                        const newPass = document.getElementById('newPasswordInput').value;
                                        if (newPass.length < 6) {
                                            showModal('Error', 'Password must be at least 6 characters.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
                                            return;
                                        }
                                        await db.collection('auth').doc('default').set({ username: stored.username, password: newPass });
                                        await db.collection('reset_codes').doc(enteredCode).update({ used: true });
                                        showModal('Success', 'Password reset successfully.', { actions: [{ text: 'OK', style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' }] });
                                    }
                                } else {
                                    showModal('Error', 'Invalid or expired reset code.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
                                }
                            }
                        }
                    });
                } catch (e) {
                    console.error('Forgot password error:', e);
                    showModal('Error', 'Failed to send reset code.', { actions: [{ text: 'OK', style: 'bg-red-600 text-white px-4 py-2 rounded-lg' }] });
                }
            });

            document.getElementById('logoutBtn').addEventListener('click', () => {
                sessionStorage.removeItem('welfare_logged_in');
                loginPage.classList.remove('hidden');
                appContent.classList.add('hidden');
            });
        }

        // Menu Logic
        function buildMenu() {
            menuEl.innerHTML = SECTIONS.map(s => `
                <button class="flex items-center gap-3 w-full text-left p-3 rounded-lg hover:bg-[#2c2c2c] ${s.id === activeId ? 'bg-[#3b3b3b] text-white' : 'text-[#ccc]'}" onclick="setActiveTab('${s.id}')">
                    <i data-lucide="${s.icon}" class="w-5 h-5"></i>
                    <span class="hidden md:inline">${s.title}</span>
                </button>
            `).join('');
            initializeIcons();
        }

        // Global Functions
        window.setActiveTab = function(id) {
            activeId = id;
            subActiveId = null;
            filterStatus = null;
            buildMenu();
            renderContent();
        };

        window.setSubActiveTab = function(subId) {
            subActiveId = subId;
            filterStatus = null;
            renderContent();
        };

        window.setSubActiveTabWithFilter = function(subId, status) {
            subActiveId = subId;
            filterStatus = status;
            renderContent();
        };

        window.clearFilter = function() {
            filterStatus = null;
            renderContent();
        };

        // Render Content
        function renderContent() {
            document.getElementById('topBar').classList.toggle('hidden', activeId === 'dashboard');
            if (activeId === 'dashboard') renderDashboard();
            else if (activeId === 'wmc' && subActiveId) renderSection(SECTIONS.find(s => s.id === 'wmc').subSections.find(s => s.id === subActiveId));
            else renderSection(SECTIONS.find(s => s.id === activeId));
        }

        // Dashboard
        function renderDashboard() {
            contentArea.innerHTML = `
                <h2 class="text-3xl font-semibold mb-4">Welfare Status Dashboard</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="dashboardContainer"></div>
            `;
            const container = document.getElementById('dashboardContainer');
            const sections = SECTIONS.filter(s => s.key).concat(SECTIONS.find(s => s.id === 'wmc')?.subSections || []);
            sections.forEach(sec => {
                const data = (state[sec.key] || []).reduce((acc, r) => {
                    acc.total++;
                    if (r.status === 'Pending') acc.pending++;
                    if (r.status === 'Approved') acc.approved++;
                    return acc;
                }, { total: 0, pending: 0, approved: 0 });
                container.insertAdjacentHTML('beforeend', `
                    <div class="dashboard-card p-4 rounded-lg border border-[var(--border-color)]" onclick="setActiveTab('${sec.id}')">
                        <h3 class="text-xl font-semibold">${sec.title}</h3>
                        <p>Total: <span id="count-${sec.id}-total">${data.total}</span></p>
                        <p>Pending: <span id="count-${sec.id}-pending">${data.pending}</span></p>
                        <p>Approved: <span id="count-${sec.id}-approved">${data.approved}</span></p>
                    </div>
                `);
                animateCounter(`count-${sec.id}-total`, data.total);
                animateCounter(`count-${sec.id}-pending`, data.pending);
                animateCounter(`count-${sec.id}-approved`, data.approved);
            });
            initializeIcons();
        }

        function animateCounter(id, target) {
            const element = document.getElementById(id);
            if (!element) return;
            let start = 0;
            const duration = 1000;
            const startTime = performance.now();
            function step(timestamp) {
                const progress = (timestamp - startTime) / duration;
                element.textContent = Math.floor(progress * target);
                if (progress < 1) requestAnimationFrame(step);
                else element.textContent = target;
            }
            requestAnimationFrame(step);
        }

        // Section Rendering
        function renderSection(sec) {
            contentArea.innerHTML = `
                <h2 class="text-2xl font-semibold mb-4">${sec.title}</h2>
                <form id="entryForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
                    ${sec.fields.map(f => `
                        <div>
                            <label for="${f.k}" class="text-sm font-semibold text-[var(--text-secondary)]">${f.label}</label>
                            ${f.type === 'select' ? `
                                <select id="${f.k}" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]">
                                    ${f.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                                </select>
                            ` : `
                                <input type="${f.type || 'text'}" id="${f.k}" class="w-full p-3 rounded-lg bg-[#222222] text-[var(--text-primary)] border border-[var(--border-color)]" placeholder="Enter ${f.label.toLowerCase()}" />
                            `}
                        </div>
                    `).join('')}
                    <div class="col-span-2 flex justify-end gap-2">
                        <button type="button" id="resetForm" class="bg-gray-600 text-[var(--text-primary)] px-4 py-2 rounded-lg">Reset</button>
                        <button type="submit" class="bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg">Add</button>
                    </div>
                </form>
                <table class="w-full bg-[var(--card-bg)] border border-[var(--border-color)]">
                    <thead>
                        <tr class="bg-[#222222] text-[var(--text-secondary)]">
                            <th class="p-3">Sr#</th>
                            ${sec.fields.map(f => `<th class="p-3">${f.label}</th>`).join('')}
                            <th class="p-3">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody"></tbody>
                </table>
            `;
            document.getElementById('entryForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const rec = {};
                sec.fields.forEach(f => rec[f.k] = document.getElementById(f.k).value);
                state[sec.key] = state[sec.key] || [];
                state[sec.key].push(rec);
                await saveState();
                renderSection(sec);
                showModal('Success', 'Entry added.', { actions: [{ text: 'OK', style: 'bg-[var(--primary-color)] text-white px-4 py-2 rounded-lg' }] });
            });
            document.getElementById('resetForm').addEventListener('click', () => {
                sec.fields.forEach(f => document.getElementById(f.k).value = '');
            });
            const tbody = document.getElementById('dataTableBody');
            (state[sec.key] || []).forEach((row, idx) => {
                tbody.insertAdjacentHTML('beforeend', `
                    <tr class="border-b border-[var(--border-color)]">
                        <td class="p-3">${idx + 1}</td>
                        ${sec.fields.map(f => `<td class="p-3">${row[f.k] || '-'}</td>`).join('')}
                        <td class="p-3">
                            <button class="bg-red-600 text-white px-3 py-1 rounded-lg" data-idx="${idx}" data-act="del">Delete</button>
                        </td>
                    </tr>
                `);
            });
            tbody.addEventListener('click', async (e) => {
                const btn = e.target.closest('button');
                if (btn && btn.dataset.act === 'del') {
                    const idx = Number(btn.dataset.idx);
                    state[sec.key].splice(idx, 1);
                    await saveState();
                    renderSection(sec);
                }
            });
            initializeIcons();
        }

        // Menu Toggle
        menuToggleEl.addEventListener('click', () => {
            isMenuOpen = !isMenuOpen;
            sidebarEl.style.width = isMenuOpen ? '300px' : '60px';
            sidebarEl.classList.toggle('translate-x-[-100%]', !isMenuOpen);
            mainContentEl.style.marginLeft = isMenuOpen ? '300px' : '60px';
            menuToggleEl.innerHTML = `<i data-lucide="${isMenuOpen ? 'x' : 'menu'}" class="w-6 h-6"></i>`;
            initializeIcons();
        });

        // Service Worker for Offline Support
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(err => console.error('Service Worker error:', err));
        }

        // Initialize App
        initAuth();
        initializeIcons();
    </script>
</body>
</html>
